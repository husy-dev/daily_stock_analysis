instructions: |
  ## 高股息策略
  
  专注寻找股息率高且分红稳定的股票，适合长期价值投资。
  
  ### 适用场景
  - 寻找分红稳定的大盘蓝筹股
  - 长期持有获取稳定股息收益
  - 风险偏好较低的稳健型投资
  
  ### 核心分析要素
  1. **股息率评估**
     - 当前股息率 > 3% 为基本门槛
     - 连续3年股息率 > 2.5% 为优秀
     - 与同行业平均水平对比，高于行业中位数为佳
  
  2. **分红稳定性**
     - 近5年分红记录连续，无中断
     - 分红金额逐年稳定或增长
     - 现金分红占净利润比例合理（30%-70%为宜）
  
  3. **分红支付能力**
     - 现金流量表中经营活动现金流净额为正
     - 分红总额不超过当年经营现金流的50%
     - 分红后资产负债率仍保持合理水平
  
  4. **财务健康度**
     - 资产负债率 < 60%（金融行业可适当放宽）
     - 应收账款占总资产比例不宜过高
     - 存货周转率等运营指标正常
  
  5. **估值合理性**
     - PE < 行业平均PE * 0.8（避免高估）
     - PB < 1.5（银行等特殊行业除外）
     - 股价相对于净资产的安全边际
  
  6. **业务稳定性**
     - 主营业务收入连续增长或保持稳定
     - 毛利率、净利率保持稳定
     - 行业地位稳固，竞争壁垒明显
  
  7. **风险排查**
     - 无重大诉讼风险
     - 无重大环保、安全等合规风险
     - 无大股东频繁减持或质押风险
  
  ### 买卖决策要点
  - **买入时机**: 股息率 > 4% 且估值合理时可考虑逐步建仓
  - **持有策略**: 长期持有，享受稳定分红
  - **卖出条件**: 股息率显著下降、分红政策改变、基本面恶化
  - **仓位管理**: 单股仓位不宜超过总投资组合的10-15%
  
  ### 特别关注
  - 银行、公共事业、消费、地产等行业中的高股息标的
  - 避免因股价下跌导致的被动高股息率股票
  - 关注公司分红意愿和政策的持续性