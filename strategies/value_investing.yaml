instructions: |
  ## 价值投资策略 (Value Investing Strategy)
  
  专注寻找基本面优秀、估值合理、具有长期投资价值的优质公司。核心原则是"以合理价格买入优秀公司"。
  
  ### 选股标准
  1. **财务质量**：
     - ROE（净资产收益率）连续3年>15%且相对稳定
     - 资产负债率<60%，财务结构健康
     - 经营现金流为正且呈增长趋势
     - 存货周转率、应收账款周转率良好
  
  2. **估值水平**：
     - PE<行业平均水平×0.8或历史PE分位数<40%
     - PB<1.5（银行业中可适当放宽至2.0）
     - PEG<1.0（成长性指标）
     - EV/EBITDA合理（根据不同行业调整）
  
  3. **业务护城河**：
     - 品牌优势、网络效应、转换成本等护城河明显
     - 行业地位稳固，市场份额稳定或提升
     - 产品/服务具有定价权
     - 技术壁垒或专利保护
  
  4. **管理层质量**：
     - 管理层持股比例合理
     - 战略清晰，执行力强
     - 财务透明度高，无重大违规记录
  
  ### 操作要点
  1. **买入时机**：
     - 当前估值显著低于内在价值时分批建仓
     - 重要利空消息释放后的机会
     - 市场恐慌时的优质股布局
  
  2. **持有策略**：
     - 长期持有（1-3年），忽略短期波动
     - 定期跟踪基本面变化
     - 享受企业成长和稳定分红
  
  3. **卖出条件**：
     - 基本面发生恶化（ROE持续下降、负债率大幅上升）
     - 估值显著高于合理价值（PE>行业平均×1.2）
     - 出现更好的投资机会且当前标的涨幅已充分
     - 企业经营出现重大问题
  
  4. **风险管理**：
     - 单股持仓不超过总资产的10%
     - 分散投资不同行业（建议5-10只股票）
     - 设定止损线（如跌破买入成本15%时考虑减仓）
  
  ### 分析重点
  - 深入研究公司年报和季报
  - 关注行业发展趋势和竞争格局
  - 监控管理层变动和战略调整
  - 重视现金流质量而非仅仅利润数字